name: validate

on:
  push:
    branches:
      - main
    paths:
      - "k8s/**"
      - "k8s-api/**"
      - "argocd/**"
      - ".github/workflows/validate.yml"
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas k8s/
          kubeconform -strict -summary -ignore-missing-schemas k8s-api/
