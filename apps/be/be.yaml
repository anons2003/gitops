apiVersion: apps/v1
kind: Deployment
metadata:
  name: be
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be
  template:
    metadata:
      labels:
        app: be
    spec:
      containers:
        - name: be
          image: hashicorp/http-echo:1.0
          args:
            - "-text=hello from backend"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: be
  namespace: demo
spec:
  selector:
    app: be
  ports:
    - port: 80
      targetPort: 5678